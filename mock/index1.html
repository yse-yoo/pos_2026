<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPOS - Natural Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#eef6f2',
                            DEFAULT: '#69be94',
                            dark: '#4a8d6e',
                            text: '#2d4a3e'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f2f5f3] min-h-screen antialiased text-brand-text">

    <nav class="bg-brand border-b border-brand-dark/20 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1600px] mx-auto px-6">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-10">
                    <span class="text-xl font-black text-white tracking-tight flex items-center gap-2">
                        <span class="bg-white/20 p-1 rounded-lg">🌿</span> SmartPOS
                    </span>
                    <div class="hidden md:flex gap-1">
                        <button onclick="switchView('pos')" class="nav-item px-4 py-2 rounded-lg text-sm font-bold text-white bg-white/10">レジ</button>
                        <button onclick="switchView('history')" class="nav-item px-4 py-2 rounded-lg text-sm font-bold text-brand-light/70 hover:text-white hover:bg-white/5 transition-all">履歴</button>
                        <button onclick="switchView('products')" class="nav-item px-4 py-2 rounded-lg text-sm font-bold text-brand-light/70 hover:text-white hover:bg-white/5 transition-all">商品管理</button>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <span id="clock" class="text-md font-mono text-white/80">--:--:--</span>
                    <button onclick="handleLogin()" class="bg-brand-dark text-white px-5 py-1.5 rounded-lg text-xs font-bold hover:bg-brand-text transition-colors">管理者</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        
        <div id="view-pos" class="view-section grid grid-cols-1 xl:grid-cols-[1fr,500px] gap-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-brand/10 flex flex-col gap-6">
                <div id="category-tabs" class="flex flex-wrap gap-2">
                    <button onclick="filterCat(this,'全て')" class="tab-btn active px-6 py-2 rounded-lg bg-brand text-white text-sm font-bold shadow-sm shadow-brand/20">全て</button>
                    <button onclick="filterCat(this,'フード')" class="tab-btn px-6 py-2 rounded-lg bg-slate-50 text-slate-500 text-sm font-bold hover:bg-brand/5 border border-transparent hover:border-brand/20 transition-all">フード</button>
                    <button onclick="filterCat(this,'ドリンク')" class="tab-btn px-6 py-2 rounded-lg bg-slate-50 text-slate-500 text-sm font-bold hover:bg-brand/5 border border-transparent hover:border-brand/20 transition-all">ドリンク</button>
                    <button onclick="filterCat(this,'トッピング')" class="tab-btn px-6 py-2 rounded-lg bg-slate-50 text-slate-500 text-sm font-bold hover:bg-brand/5 border border-transparent hover:border-brand/20 transition-all">トッピング</button>
                    <button onclick="filterCat(this,'有料袋')" class="tab-btn px-6 py-2 rounded-lg bg-slate-50 text-slate-500 text-sm font-bold hover:bg-brand/5 border border-transparent hover:border-brand/20 transition-all">有料袋</button>
                </div>
                
                <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 overflow-y-auto max-h-[720px] pr-2">
                    </div>
            </div>

            <div class="bg-white flex flex-col h-[780px] rounded-2xl shadow-sm border border-brand/10 overflow-hidden">
                <div class="p-5 border-b border-slate-50 flex justify-between items-center bg-brand/5">
                    <h2 class="font-bold text-lg text-brand-dark">注文内容</h2>
                    <span id="receipt-num" class="text-xs font-mono font-bold text-slate-400 bg-white px-3 py-1 rounded-full border border-slate-100">NO.0001</span>
                </div>

                <div id="receipt-items" class="flex-1 p-5 overflow-y-auto space-y-2">
                    <div class="text-center py-20 text-slate-300">
                        <p class="text-sm font-bold italic">No items selected</p>
                    </div>
                </div>

                <div class="p-6 bg-slate-50 space-y-3">
                    <div class="flex justify-between text-sm text-slate-500">
                        <span>小計</span>
                        <span id="subtotal" class="font-mono">¥0</span>
                    </div>
                    <div class="flex justify-between text-sm text-slate-400 border-b border-slate-200 pb-3">
                        <span>消費税 (10%)</span>
                        <span id="tax" class="font-mono">¥0</span>
                    </div>
                    <div class="flex justify-between items-baseline pt-1">
                        <span class="text-lg font-bold">合計金額</span>
                        <span id="total" class="text-4xl font-black text-brand-dark font-mono">¥0</span>
                    </div>
                </div>

                <div class="p-4 grid grid-cols-4 gap-2 bg-white border-t border-slate-100">
                    <button onclick="clearOrder()" class="p-3 rounded-lg text-slate-400 font-bold hover:bg-slate-50 text-xs transition-colors">クリア</button>
                    <button onclick="confirmPay('現金')" class="p-3 rounded-lg bg-slate-100 text-slate-600 font-bold hover:bg-brand/10 transition-all text-xs">現金</button>
                    <button onclick="confirmPay('カード')" class="p-3 rounded-lg bg-slate-100 text-slate-600 font-bold hover:bg-brand/10 transition-all text-xs">カード</button>
                    <button onclick="confirmPay('会計')" class="p-3 bg-brand text-white rounded-lg font-bold hover:bg-brand-dark transition-all shadow-md shadow-brand/20">会計確定</button>
                </div>
            </div>
        </div>

    </main>

    <script src="js/products.js"></script>
    <script src="js/app1.js"></script>
</body>
</html>
