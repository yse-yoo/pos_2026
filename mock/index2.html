<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pos - Vertical Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カテゴリ選択をスクロール可能に */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen antialiased text-gray-800 flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-14">
                <div class="flex items-center gap-6">
                    <span class="text-lg font-bold text-blue-600">SmartPOS</span>
                    <div class="hidden md:flex gap-1">
                        <button onclick="switchView('pos')" class="nav-item px-3 py-1 rounded-md text-sm font-medium text-blue-600 bg-blue-50">レジ</button>
                        <button onclick="switchView('history')" class="nav-item px-3 py-1 rounded-md text-sm font-medium text-gray-500">会計履歴</button>
                    </div>
                </div>
                <div class="flex items-center gap-4 text-sm">
                    <span id="clock" class="font-mono text-gray-400">--:--:--</span>
                    <button onclick="handleLogin()" class="bg-gray-800 text-white px-3 py-1 rounded-lg hover:bg-gray-700 transition-colors">管理者</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col mx-auto w-full p-2 sm:p-4 gap-4 overflow-hidden">
        
        <div id="view-pos" class="view-section flex flex-col gap-4 h-full">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden min-h-[400px]">
                <div class="p-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                    <div id="category-tabs" class="flex gap-2 overflow-x-auto no-scrollbar">
                        <button onclick="filterCat(this,'全て')" class="tab-btn active whitespace-nowrap px-4 py-1.5 rounded-full border border-blue-600 bg-blue-600 text-white text-xs">全て</button>
                        <button onclick="filterCat(this,'フード')" class="tab-btn whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-300 bg-white text-gray-500 text-xs hover:bg-gray-100">クレープ</button>
                        <button onclick="filterCat(this,'ドリンク')" class="tab-btn whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-300 bg-white text-gray-500 text-xs hover:bg-gray-100">ドリンク</button>
                        <button onclick="filterCat(this,'トッピング')" class="tab-btn whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-300 bg-white text-gray-500 text-xs hover:bg-gray-100">トッピング</button>
                        <button onclick="filterCat(this,'有料袋')" class="tab-btn whitespace-nowrap px-4 py-1.5 rounded-full border border-gray-300 bg-white text-gray-500 text-xs hover:bg-gray-100">有料袋</button>
                    </div>
                    <button onclick="openCodeModal()" class="px-3 py-1.5 rounded-full bg-gray-200 text-gray-600 text-[10px] font-bold hover:bg-gray-300">コード入力</button>
                </div>
                <div id="product-grid" class="flex-1 p-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 overflow-y-auto">
                    </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg border border-gray-300 overflow-hidden grid grid-cols-1 md:grid-cols-[1fr,320px] min-h-[280px]">
                <div class="flex flex-col border-r border-gray-100">
                    <div class="px-4 py-2 bg-gray-50 border-b border-gray-100 flex justify-between">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">注文内容</span>
                        <span id="receipt-num" class="text-[10px] font-mono text-gray-400">#0001</span>
                    </div>
                    <div id="receipt-items" class="flex-1 p-4 overflow-y-auto space-y-2 max-h-[160px]">
                        <div class="text-center py-6 text-gray-300 text-sm italic">商品をタップしてください</div>
                    </div>
                </div>

                <div class="bg-blue-50/30 p-4 flex flex-col justify-between">
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs text-gray-500">
                            <span>小計</span>
                            <span id="subtotal" class="font-mono">¥0</span>
                        </div>
                        <div class="flex justify-between text-xs text-gray-500 pb-1">
                            <span>消費税 (10%)</span>
                            <span id="tax" class="font-mono">¥0</span>
                        </div>
                        <div class="flex justify-between items-baseline pt-2 border-t border-blue-200">
                            <span class="text-sm font-bold">合計</span>
                            <span id="total" class="text-3xl font-black text-blue-600 font-mono">¥0</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button onclick="clearOrder()" class="py-2 rounded-lg border border-gray-300 bg-white text-xs font-bold hover:bg-red-50 hover:text-red-500 transition-colors">クリア</button>
                        <button onclick="confirmPay('現金')" class="py-2 rounded-lg bg-white border border-blue-200 text-xs font-bold hover:bg-blue-50 transition-colors">現金</button>
                        <button onclick="confirmPay('カード')" class="py-2 rounded-lg bg-white border border-blue-200 text-xs font-bold hover:bg-blue-50 transition-colors">カード</button>
                        <button onclick="confirmPay('会計')" class="py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 shadow-md shadow-blue-200">会計確定</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-history" class="view-section hidden bg-white p-8 rounded-xl border border-gray-200">
            <h2 class="font-bold">履歴</h2>
        </div>

    </main>

    <div id="code-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-[280px] overflow-hidden animate-in zoom-in-95 duration-200">
            <div class="bg-gray-900 p-5 text-right">
                <div class="text-gray-500 text-[10px] uppercase mb-1">Product Code</div>
                <div id="code-display" class="text-white text-4xl font-mono min-h-[40px]"></div>
            </div>
            <div class="grid grid-cols-3 gap-px bg-gray-200">
                <button onclick="pressKey('1')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">1</button>
                <button onclick="pressKey('2')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">2</button>
                <button onclick="pressKey('3')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">3</button>
                <button onclick="pressKey('4')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">4</button>
                <button onclick="pressKey('5')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">5</button>
                <button onclick="pressKey('6')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">6</button>
                <button onclick="pressKey('7')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">7</button>
                <button onclick="pressKey('8')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">8</button>
                <button onclick="pressKey('9')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">9</button>
                <button onclick="clearKey()" class="bg-gray-50 py-4 text-lg font-bold text-red-500 active:bg-gray-100">C</button>
                <button onclick="pressKey('0')" class="bg-white py-4 text-xl font-bold active:bg-gray-100">0</button>
                <button onclick="closeCodeModal()" class="bg-gray-50 py-4 text-sm font-bold text-gray-400">✕</button>
            </div>
            <button onclick="submitCode()" class="w-full bg-blue-600 text-white py-4 font-bold hover:bg-blue-700">確定</button>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/app2.js"></script>
    <script src="js/calculator.js"></script>
</body>
</html>
